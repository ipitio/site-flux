<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6eedb" />
    <title>Offline | FLUX</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6eedb;
        --card: #fff9ef;
        --ink: #241709;
        --muted: #6b5944;
        --accent: #d97706;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top, rgba(245, 158, 11, 0.18), transparent 32%), var(--bg);
        color: var(--ink);
        font: 16px/1.6 Lato, sans-serif;
      }

      main {
        width: min(100%, 38rem);
        padding: 2rem;
        border: 1px solid rgba(36, 23, 9, 0.08);
        border-radius: 28px;
        background: var(--card);
        box-shadow: 0 24px 60px rgba(36, 23, 9, 0.12);
      }

      p {
        margin: 0;
      }

      .eyebrow {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0.75rem 0 0;
        font: 400 clamp(2rem, 6vw, 3rem)/0.95 "Rubik Mono One", sans-serif;
      }

      .body {
        margin-top: 1rem;
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }

      a,
      button {
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1.1rem;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      a {
        background: var(--accent);
        color: #fffbf2;
      }

      button {
        background: rgba(36, 23, 9, 0.06);
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Offline</p>
      <h1>FLUX</h1>
      <p class="body">You are offline. Reconnect to load the latest mentorship pages, contact details, and community updates.</p>
      <div class="actions">
        <a href="/">Go home</a>
        <button type="button" onclick="window.location.reload()">Try again</button>
      </div>
    </main>
  </body>
</html>
